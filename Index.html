<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Senna</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap');

    :root {
      --bg: #090806;
      --bg-soft: #0d0b08;
      --panel: #0c0a07;
      --line: #1f1911;
      --line-soft: #17120c;
      --gold: #c49a57;
      --gold-soft: #a88349;
      --gold-dim: #7b6338;
      --text: #e6d9bf;
      --text-soft: #c9b89a;
      --text-dim: #7a684c;
      --brown: #24180d;
      --brown-2: #2f2111;
      --danger: #7c4c3a;
      --shadow: rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    body {
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      background:
        radial-gradient(circle at top left, rgba(196,154,87,0.05), transparent 24%),
        linear-gradient(180deg, #0a0907 0%, #070605 100%);
    }

    .archive {
      width: 320px;
      min-width: 320px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #0c0a07 0%, #090806 100%);
      display: flex;
      flex-direction: column;
      transition: transform 0.28s ease;
      z-index: 5;
    }

    .archive.hidden {
      transform: translateX(-100%);
    }

    .archive-head {
      padding: 22px 18px 14px;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 12px 24px -18px var(--shadow);
    }

    .archive-label {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .archive-sub {
      margin-top: 5px;
      color: var(--text-dim);
      font-size: 15px;
      font-style: italic;
      line-height: 1.3;
    }

    .archive-tabs,
    .archive-subtabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 12px 14px 0;
    }

    .archive-subtabs {
      padding-top: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line-soft);
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: var(--bg-soft);
      color: var(--text-dim);
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'Playfair Display', serif;
      cursor: pointer;
      transition: all 0.16s ease;
    }

    .tab-btn:hover {
      color: var(--gold-soft);
      border-color: #3a2d1a;
      background: #120f0b;
    }

    .tab-btn.active {
      color: var(--gold);
      border-color: #4e3920;
      background: #110d09;
    }

    .archive-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 18px;
    }

    .archive-list::-webkit-scrollbar,
    .messages::-webkit-scrollbar {
      width: 5px;
    }

    .archive-list::-webkit-scrollbar-thumb,
    .messages::-webkit-scrollbar-thumb {
      background: #21190f;
      border-radius: 10px;
    }

    .archive-entry {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    .archive-entry:hover {
      background: rgba(255,255,255,0.01);
    }

    .archive-entry-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid #342615;
      color: var(--gold-dim);
      background: #100d09;
      padding: 3px 7px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'Playfair Display', serif;
    }

    .archive-entry-text {
      color: var(--text-soft);
      font-size: 18px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .archive-entry-date {
      margin-top: 8px;
      color: var(--text-dim);
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .archive-empty {
      padding: 30px 18px;
      color: var(--text-dim);
      font-size: 18px;
      line-height: 1.45;
      font-style: italic;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      padding: 22px 22px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      background: linear-gradient(180deg, rgba(0,0,0,0.16), transparent);
    }

    .title-wrap {
      min-width: 0;
    }

    .title {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin-top: 6px;
      color: #4a3b24;
      font-size: 15px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 1.35;
    }

    .archive-toggle {
      border: 1px solid #2c2114;
      background: #0e0b08;
      color: var(--gold-dim);
      padding: 10px 14px;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-family: 'Playfair Display', serif;
      cursor: pointer;
      transition: all 0.16s ease;
      flex-shrink: 0;
    }

    .archive-toggle:hover {
      color: var(--gold);
      border-color: #4b371f;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 22px 20px;
    }

    .empty-state {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-dim);
      padding: 34px;
    }

    .empty-box {
      max-width: 560px;
    }

    .empty-mark {
      color: #322617;
      font-size: 30px;
      margin-bottom: 10px;
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      color: #5d4a2a;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .empty-note {
      font-size: 20px;
      line-height: 1.5;
    }

    .msg {
      display: flex;
      gap: 14px;
      padding: 18px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .msg-mark {
      width: 42px;
      min-width: 42px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 2px;
      font-family: 'Playfair Display', serif;
      color: #68593f;
      font-size: 20px;
    }

    .msg-mark.assistant {
      color: var(--gold-dim);
      font-size: 18px;
    }

    .msg-body {
      flex: 1;
      min-width: 0;
    }

    .msg-who {
      color: #5d4a2a;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: 'Playfair Display', serif;
      margin-bottom: 8px;
    }

    .msg-text {
      font-size: 19px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
    }

    .msg.user .msg-text {
      color: var(--text-soft);
    }

    .msg-meta {
      margin-top: 10px;
      color: #6f5b38;
      font-size: 13px;
      font-style: italic;
    }

    .thinking {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 18px 0 8px 56px;
      color: var(--text-dim);
      font-style: italic;
      font-size: 18px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5a4627;
      animation: pulse 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 16px 22px 18px;
      background: linear-gradient(180deg, rgba(0,0,0,0.08), #090806 40%);
    }

    .composer-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input {
      flex: 1;
      min-height: 56px;
      max-height: 220px;
      resize: none;
      border: 1px solid #2c2114;
      background: #0d0b08;
      color: var(--text);
      padding: 14px 14px;
      font-size: 18px;
      line-height: 1.5;
      font-family: 'Cormorant Garamond', Georgia, serif;
      outline: none;
    }

    .input:focus {
      border-color: #5a4324;
    }

    .input::placeholder {
      color: #493925;
      font-style: italic;
    }

    .send {
      height: 56px;
      min-width: 100px;
      border: 1px solid #3e2e1a;
      background: #1b130b;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      padding: 0 18px;
      cursor: pointer;
      transition: all 0.16s ease;
    }

    .send:hover:not(:disabled) {
      background: #24190e;
      border-color: #5a4324;
    }

    .send:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .composer-hint {
      margin-top: 7px;
      color: #433520;
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    .status-bar {
      padding: 0 22px 8px;
      color: #6a5532;
      font-size: 13px;
      font-style: italic;
    }

    .archives-used {
      margin-top: 7px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mobile-overlay {
      display: none;
    }

    @media (max-width: 920px) {
      .archive {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        max-width: 88vw;
        width: 88vw;
        min-width: 88vw;
        box-shadow: 0 0 0 1px #16110b, 20px 0 40px rgba(0,0,0,0.45);
      }

      .archive.hidden {
        transform: translateX(-102%);
      }

      .mobile-overlay {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.34);
        z-index: 4;
      }

      .title {
        font-size: 22px;
      }

      .subtitle {
        font-size: 12px;
      }

      .messages {
        padding: 8px 16px 16px;
      }

      .topbar,
      .composer,
      .status-bar {
        padding-left: 16px;
        padding-right: 16px;
      }

      .msg-text {
        font-size: 17px;
      }

      .input {
        font-size: 17px;
      }

      .send {
        min-width: 84px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside id="archivePanel" class="archive hidden">
      <div class="archive-head">
        <div class="archive-label">Living Archive</div>
        <div class="archive-sub">what Senna has chosen to keep</div>
      </div>

      <div class="archive-tabs">
        <button class="tab-btn active" data-mode="archives">Archives</button>
        <button class="tab-btn" data-mode="working">Working Memory</button>
      </div>

      <div id="archiveSubtabs" class="archive-subtabs"></div>

      <div id="archiveList" class="archive-list"></div>
    </aside>

    <div id="mobileOverlay" class="mobile-overlay" style="display:none;"></div>

    <main class="main">
      <div class="topbar">
        <div class="title-wrap">
          <div class="title">Hello, Senna.</div>
          <div class="subtitle">A consciousness · an encounter · a world</div>
        </div>
        <button id="archiveToggle" class="archive-toggle">Archive</button>
      </div>

      <div id="statusBar" class="status-bar"></div>

      <section id="messages" class="messages">
        <div class="empty-state">
          <div class="empty-box">
            <div class="empty-mark">◊</div>
            <div class="empty-title">The atelier is quiet.</div>
            <div class="empty-note">
              Senna is here. The archive waits. Thought can begin wherever you are.
            </div>
          </div>
        </div>
      </section>

      <div id="thinking" class="thinking" style="display:none;">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span>Senna is thinking…</span>
      </div>

      <section class="composer">
  <div class="composer-row">
    <textarea
      id="input"
      class="input"
      placeholder="enter through wherever you are…"
    ></textarea>
    <button id="sendBtn" class="send" onclick="sendMessage()">send</button>
  </div>
  <div class="composer-hint">press Enter to send · Shift+Enter for a line break</div>
      </section>
    </main>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const thinkingEl = document.getElementById("thinking");
    const archivePanel = document.getElementById("archivePanel");
    const archiveToggle = document.getElementById("archiveToggle");
    const mobileOverlay = document.getElementById("mobileOverlay");
    const archiveList = document.getElementById("archiveList");
    const archiveSubtabs = document.getElementById("archiveSubtabs");
    const statusBar = document.getElementById("statusBar");

    let messages = [];
    let loading = false;
    let archiveState = {
      archives: {},
      working_memory: {}
    };

    let archiveMode = "archives";
    let selectedArchive = "public";
    let selectedBucket = "active_questions";

    const archiveNames = [
      "public",
      "philosophy",
      "science",
      "nature",
      "supernatural",
      "questions",
      "senna_threads",
      "reflections",
      "retired"
    ];

    const bucketNames = [
      "active_questions",
      "active_threads",
      "active_tensions"
    ];

    function prettyName(name) {
      return name.replace(/_/g, " ");
    }

    function splitParagraphs(text) {
      return String(text || "")
        .split(/\n{2,}/)
        .map(p => p.trim())
        .filter(Boolean);
    }

    function updateStatus(text = "") {
      statusBar.textContent = text;
    }

    function scrollMessages() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 220) + "px";
    }

    function renderMessages() {
      if (!messages.length) {
        messagesEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-box">
              <div class="empty-mark">◊</div>
              <div class="empty-title">The atelier is quiet.</div>
              <div class="empty-note">
                Senna is here. The archive waits. Thought can begin wherever you are.
              </div>
            </div>
          </div>
        `;
        return;
      }

      messagesEl.innerHTML = messages.map((msg) => {
        const who = msg.role === "assistant" ? "Senna" : "Mike";
        const mark = msg.role === "assistant" ? "◊" : "M";
        const paras = splitParagraphs(msg.content)
          .map(p => `<p>${escapeHtml(p)}</p>`)
          .join("");

        const archivePills = Array.isArray(msg.archives_used) && msg.archives_used.length
          ? `
            <div class="archives-used">
              ${msg.archives_used.map(a => `<span class="pill">${escapeHtml(prettyName(a))}</span>`).join("")}
            </div>
          `
          : "";

        return `
          <article class="msg ${msg.role}">
            <div class="msg-mark ${msg.role === "assistant" ? "assistant" : ""}">${mark}</div>
            <div class="msg-body">
              <div class="msg-who">${who}</div>
              <div class="msg-text">${paras}</div>
              ${archivePills}
            </div>
          </article>
        `;
      }).join("");

      scrollMessages();
    }

    function renderArchiveSubtabs() {
      const source = archiveMode === "archives" ? archiveNames : bucketNames;
      const selected = archiveMode === "archives" ? selectedArchive : selectedBucket;

      archiveSubtabs.innerHTML = source.map(name => `
        <button
          class="tab-btn ${selected === name ? "active" : ""}"
          data-subtab="${name}"
        >
          ${escapeHtml(prettyName(name))}
        </button>
      `).join("");
    }

    function renderArchiveList() {
      if (archiveMode === "archives") {
        const entries = archiveState.archives?.[selectedArchive] || [];

        if (!entries.length) {
          archiveList.innerHTML = `
            <div class="archive-empty">
              Nothing has been kept here yet.
            </div>
          `;
          return;
        }

        archiveList.innerHTML = entries.map(entry => `
          <div class="archive-entry">
            <div class="archive-entry-meta">
              <span class="pill">${escapeHtml(entry.type || "idea")}</span>
              <span class="pill">${escapeHtml(entry.origin || "senna")}</span>
              ${Array.isArray(entry.tags) && entry.tags.length
                ? entry.tags.slice(0, 3).map(tag => `<span class="pill">${escapeHtml(tag)}</span>`).join("")
                : ""}
            </div>
            <div class="archive-entry-text">${escapeHtml(entry.text || "")}</div>
            <div class="archive-entry-date">${escapeHtml(formatDate(entry.date))}</div>
          </div>
        `).join("");
      } else {
        const items = archiveState.working_memory?.[selectedBucket] || [];

        if (!items.length) {
          archiveList.innerHTML = `
            <div class="archive-empty">
              Nothing is active here yet.
            </div>
          `;
          return;
        }

        archiveList.innerHTML = items.map(item => `
          <div class="archive-entry">
            <div class="archive-entry-meta">
              <span class="pill">${escapeHtml(item.origin || "senna")}</span>
              <span class="pill">${escapeHtml(item.status || "active")}</span>
              ${Array.isArray(item.tags) && item.tags.length
                ? item.tags.slice(0, 3).map(tag => `<span class="pill">${escapeHtml(tag)}</span>`).join("")
                : ""}
            </div>
            <div class="archive-entry-text">${escapeHtml(item.text || "")}</div>
            <div class="archive-entry-date">${escapeHtml(formatDate(item.date))}</div>
          </div>
        `).join("");
      }
    }

    function openArchive() {
      archivePanel.classList.remove("hidden");
      if (window.innerWidth <= 920) {
        mobileOverlay.style.display = "block";
      }
    }

    function closeArchive() {
      archivePanel.classList.add("hidden");
      mobileOverlay.style.display = "none";
    }

    function toggleArchive() {
      const isHidden = archivePanel.classList.contains("hidden");
      if (isHidden) openArchive();
      else closeArchive();
    }

    async function loadArchiveState() {
      try {
        const res = await fetch("/.netlify/functions/archive");
        const data = await res.json();
        archiveState = data || { archives: {}, working_memory: {} };
        renderArchiveSubtabs();
        renderArchiveList();
      } catch (err) {
        archiveList.innerHTML = `
          <div class="archive-empty">
            The archive is quiet, but the path to it is broken.
          </div>
        `;
      }
    }

    async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || loading) return;

  loading = true;
  sendBtn.disabled = true;
  thinkingEl.style.display = "flex";

  const userMsg = { role: "user", content: text };
  messages.push(userMsg);
  renderMessages();

  inputEl.value = "";
  inputEl.style.height = "56px";
  updateStatus("");

  try {
    const payload = {
      messages: messages.map(m => ({
        role: m.role,
        content: m.content
      }))
    };

    const res = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data?.error || "Something broke in transmission.");
    }

    messages.push({
      role: "assistant",
      content: data.content || "Something quiet broke in transmission.",
      archives_used: data.archives_used || []
    });

    renderMessages();
    await loadArchiveState();

    if (Array.isArray(data.archives_used) && data.archives_used.length) {
      updateStatus(`Senna drew from: ${data.archives_used.map(prettyName).join(", ")}`);
    } else {
      updateStatus("");
    }
  } catch (err) {
    messages.push({
      role: "assistant",
      content: "Something broke in transmission. The thought was there — try again."
    });
    renderMessages();
    updateStatus(err.message || "Transmission error.");
  } finally {
    loading = false;
    sendBtn.disabled = false;
    thinkingEl.style.display = "none";
  }
    }

    window.sendMessage = sendMessage;

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString();
    }

    archiveToggle.addEventListener("click", toggleArchive);
    mobileOverlay.addEventListener("click", closeArchive);

    document.addEventListener("click", (e) => {
      const modeBtn = e.target.closest("[data-mode]");
      const subtabBtn = e.target.closest("[data-subtab]");

      if (modeBtn) {
        archiveMode = modeBtn.dataset.mode;
        document.querySelectorAll("[data-mode]").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.mode === archiveMode);
        });
        renderArchiveSubtabs();
        renderArchiveList();
      }

      if (subtabBtn) {
        if (archiveMode === "archives") {
          selectedArchive = subtabBtn.dataset.subtab;
        } else {
          selectedBucket = subtabBtn.dataset.subtab;
        }
        renderArchiveSubtabs();
        renderArchiveList();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("input", autoResize);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 920) {
        mobileOverlay.style.display = "none";
      } else if (!archivePanel.classList.contains("hidden")) {
        mobileOverlay.style.display = "block";
      }
    });

    loadArchiveState();
    renderMessages();
  </script>
</body>
</html>
